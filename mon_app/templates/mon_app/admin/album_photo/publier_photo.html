{% extends "mon_app/baseA.html" %}

{% block content %}
<style>
    /* Style du conteneur de formulaire */
    .form-container {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(74, 124, 89, 0.06);
        border: 1px solid #e2e8f0;
        padding: 2.5rem;
        max-width: 700px;
        margin: 20px auto;
        transition: background 0.3s, color 0.3s;
    }

    [data-theme="dark"] .form-container {
        background: #1e293b;
        border-color: #334155;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .form-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: #4A7c59; /* Vert Forêt */
    }
    [data-theme="dark"] .form-title {
        color: #f1f5f9;
    }

    /* Groupes de champs */
    .form-group {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #4b5563;
    }
    [data-theme="dark"] .form-group label {
        color: #cbd5e1;
    }

    /* Inputs et Textarea */
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        font-family: 'Poppins', sans-serif;
        font-size: 0.9rem;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #f8fafc;
        color: #1e293b;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }
    [data-theme="dark"] .form-control {
        background: #0f172a;
        border-color: #334155;
        color: #f1f5f9;
    }

    /* Focus sur les inputs : Vert Forêt */
    .form-control:focus {
        border-color: #4A7c59;
        background-color: #ffffff;
        box-shadow: 0 0 0 4px rgba(74, 124, 89, 0.15);
    }
    [data-theme="dark"] .form-control:focus {
        background-color: #0f172a;
    }

    /* Style spécifique pour le champ fichier */
    .form-control-file {
        padding: 0.75rem 1rem;
        border: 2px dashed #e2e8f0;
        border-radius: 10px;
        cursor: pointer;
        background: #f8fafc;
        color: #4b5563;
    }
    [data-theme="dark"] .form-control-file {
        background: #0f172a;
        border-color: #334155;
        color: #94a3b8;
    }
    .form-control-file:focus {
        border-color: #4A7c59;
        border-style: dashed;
    }

    /* Actions bouton */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 2rem;
        padding-top: 16px;
        border-top: 1px solid #e2e8f0;
    }
    [data-theme="dark"] .form-actions {
        border-top-color: #334155;
    }

    .btn-submit {
        background-color: #4A7c59; /* Vert Forêt */
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(74, 124, 89, 0.15); /* Ombre Verte corrigée */
        transition: all 0.2s ease;
    }

    .btn-submit:hover {
        background-color: #3b6347; /* Vert plus sombre au survol */
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(74, 124, 89, 0.25);
    }

    .btn-cancel {
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        color: #475569;
        padding: 0.75rem 1.5rem;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        text-decoration: none;
        text-align: center;
        transition: all 0.2s ease;
    }
    [data-theme="dark"] .btn-cancel {
        background: #1e293b;
        border-color: #334155;
        color: #94a3b8;
    }
    .btn-cancel:hover {
        background: #e2e8f0;
    }
    [data-theme="dark"] .btn-cancel:hover {
        background: #334155;
        color: #f1f5f9;
    }
</style>

<div class="form-container">
    <h2 class="form-title">
        <i class="fas fa-camera" style="margin-right: 10px; color: #4A7c59;"></i> Publier une nouvelle photo <!-- Couleur fixée ici -->
    </h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_titre">Titre de l'événement</label>
            <input type="text" name="titre" id="id_titre" class="form-control" required placeholder="Ex: Remise des diplômes 2026">
        </div>

        <div class="form-group">
            <label for="id_contenu">Description / Contenu</label>
            <textarea name="contenu" id="id_contenu" rows="5" class="form-control" required placeholder="Décrivez brièvement le contexte de la photo..."></textarea>
        </div>

        <div class="form-group">
            <label for="id_image">Fichier Image d'illustration</label>
            <input type="file" name="image" id="id_image" class="form-control form-control-file" accept="image/*">
        </div>

        <div class="form-actions">
            <a href="{% url 'dashboard_admin' %}" class="btn-cancel">Annuler</a>
            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Publier la photo
            </button>
        </div>
    </form>
</div>
{% endblock %}
