{% extends "mon_app/baseA.html" %}

{% block content %}
<style>
    /* --- CONTENEUR PRINCIPAL (GLASSMORPHIC) --- */
    .form-container {
        width: 100%;
        max-width: 700px;
        margin: 20px auto;
        padding: 2.5rem;
        
        /* Effet de verre ultra-transparent */
        background-color: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.45);
        transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
        box-sizing: border-box;
    }

    [data-theme="dark"] .form-container {
        background-color: rgba(30, 41, 59, 0.3);
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    }

    .form-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        color: #4A7c59; /* Vert Forêt original */
    }
    
    [data-theme="dark"] .form-title {
        color: #62a375;
    }

    /* --- GROUPES DE CHAMPS --- */
    .form-group {
        margin-bottom: 1.5rem;
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: #334155;
    }
    
    [data-theme="dark"] .form-group label {
        color: #cbd5e1;
    }

    /* --- INPUTS ET TEXTAREA TRANSLUCIDES --- */
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        font-family: 'Poppins', sans-serif;
        font-size: 0.9rem;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 10px;
        background-color: rgba(255, 255, 255, 0.25);
        color: #0f172a;
        outline: none;
        transition: all 0.2s ease;
        box-sizing: border-box;
    }
    
    [data-theme="dark"] .form-control {
        background-color: rgba(15, 23, 42, 0.25);
        border-color: rgba(255, 255, 255, 0.1);
        color: #ffffff;
    }

    /* Focus sur les champs textuels */
    .form-control:focus {
        border-color: #4A7c59;
        background-color: rgba(253, 251, 247, 0.9); /* Blanc cassé opaque au focus */
        box-shadow: 0 0 0 4px rgba(74, 124, 89, 0.2);
    }
    
    [data-theme="dark"] .form-control:focus {
        background-color: rgba(15, 23, 42, 0.9);
        border-color: #62a375;
        box-shadow: 0 0 0 4px rgba(98, 163, 117, 0.2);
    }

    /* --- ZONE DE DÉPÔT D'IMAGE (DASHED VERRE) --- */
    .form-control-file {
        padding: 0.75rem 1rem;
        border: 2px dashed rgba(255, 255, 255, 0.6);
        border-radius: 10px;
        cursor: pointer;
        background-color: rgba(253, 251, 247, 0.2); /* Blanc cassé translucide */
        color: #475569;
    }
    
    [data-theme="dark"] .form-control-file {
        background-color: rgba(15, 23, 42, 0.2);
        border-color: rgba(255, 255, 255, 0.15);
        color: #94a3b8;
    }
    
    .form-control-file:focus {
        border-color: #4A7c59;
        border-style: dashed;
        background-color: rgba(250, 250, 250, 0.4);
    }

    [data-theme="dark"] .form-control-file:focus {
        border-color: #62a375;
        background-color: rgba(15, 23, 42, 0.4);
    }

    /* --- ACTIONS / BOUTONS --- */
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 2rem;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.3);
    }
    
    [data-theme="dark"] .form-actions {
        border-top-color: rgba(255, 255, 255, 0.05);
    }

    .btn-submit {
        background-color: #4A7c59;
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 600;
        border-radius: 10px;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(74, 124, 89, 0.2);
        transition: all 0.2s ease;
    }

    .btn-submit:hover {
        background-color: #3b6347;
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(74, 124, 89, 0.3);
    }

    .btn-cancel {
        background-color: rgba(255, 255, 255, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.5);
        color: #334155;
        padding: 0.75rem 1.5rem;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 500;
        border-radius: 10px;
        text-decoration: none;
        text-align: center;
        transition: all 0.2s ease;
    }
    
    [data-theme="dark"] .btn-cancel {
        background-color: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.1);
        color: #cbd5e1;
    }
    
    .btn-cancel:hover {
        background-color: rgba(255, 255, 255, 0.7);
    }
    
    [data-theme="dark"] .btn-cancel:hover {
        background-color: rgba(255, 255, 255, 0.15);
        color: #ffffff;
    }
</style>

<div class="form-container">
    <h2 class="form-title">
        <i class="fas fa-camera" style="margin-right: 10px; color: #4A7c59;"></i> Publier une nouvelle photo
    </h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="id_titre">Titre de l'événement</label>
            <input type="text" name="titre" id="id_titre" class="form-control" required placeholder="Ex: Remise des diplômes 2026">
        </div>

        <div class="form-group">
            <label for="id_contenu">Description / Contenu</label>
            <textarea name="contenu" id="id_contenu" rows="5" class="form-control" required placeholder="Décrivez brièvement le contexte de la photo..."></textarea>
        </div>

        <div class="form-group">
            <label for="id_image">Fichier Image d'illustration</label>
            <input type="file" name="image" id="id_image" class="form-control form-control-file" accept="image/*">
        </div>

        <div class="form-actions">
            <a href="{% url 'dashboard_admin' %}" class="btn-cancel">Annuler</a>
            <button type="submit" class="btn-submit">
                <i class="fas fa-paper-plane" style="margin-right: 8px;"></i> Publier la photo
            </button>
        </div>
    </form>
</div>
{% endblock %}
