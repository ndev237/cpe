{% extends 'mon_app/baseA.html' %}

{% block content %}
<div style="max-width: 700px; margin: 60px auto; padding: 20px; background: rgba(255,255,255,0.85); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">
  <h2 style="color:#398e4a; margin-bottom: 10px;">Supprimer l'annonce</h2>
  <p style="color:#475569; margin-top: 0;">
    Voulez-vous vraiment supprimer <strong>{{ annonce.titre }}</strong> ?
  </p>

  <form method="post" style="display:flex; gap: 12px; margin-top: 20px;">
    {% csrf_token %}
    <button type="submit" style="background:#ef4444; color:white; border:none; border-radius:10px; padding:10px 16px; cursor:pointer; font-weight:700;">
      Oui, supprimer
    </button>
    <a href="{% url 'admin_list_anonces' %}" style="background:#e2e8f0; color:#334155; border:none; border-radius:10px; padding:10px 16px; text-decoration:none; display:inline-flex; align-items:center; font-weight:700;">
      Annuler
    </a>
  </form>
</div>
{% endblock %}
