{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Connexion Administration - CPE" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- STYLES GÉNÉRAUX --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f5; /* Fond très légèrement teinté de vert */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* --- CONTENEUR SPLIT EN DEUX --- */
        .login-container {
            width: 100%;
            max-width: 960px;
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(74, 124, 89, 0.06);
            border: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            overflow: hidden;
            min-height: 560px;
        }

        /* --- COLONNE GAUCHE : VISUEL (DOMINANTE VERT PÂLE) --- */
        .login-sidebar {
            background: linear-gradient(135deg, #4A7c59 0%, #2c4c35 100%); /* Dégradé vert de ta sidebar */
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Effet de halo lumineux en arrière-plan */
        .login-sidebar::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(209, 143, 178, 0.15); /* Rappel rose transparent */
            border-radius: 50%;
            filter: blur(40px);
        }

        .login-hero-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
        }

        /* --- COLONNE DROITE : FORMULAIRE --- */
        .login-form-area {
            padding: 3.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- EN-TÊTE --- */
        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #4A7c59; /* Titre principal en Vert */
            letter-spacing: -0.5px;
        }

        .login-header h1 span {
            color: #D18FB2; /* Touche de rose conservée sur le + */
        }

        .login-header p {
            color: #64748b;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        /* --- ERREURS DJANGO --- */
        .alert-container {
            margin-bottom: 1.5rem;
        }

        .alert-error {
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            border-radius: 12px;
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
        }

        /* --- CONFIGURATION DES CHAMPS --- */
        .form-space {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1.25rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            background-color: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        /* Focus effet sur les inputs (Halo vert transparent) */
        .form-control:focus {
            border-color: #4A7c59;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(74, 124, 89, 0.15);
        }

        /* --- BOUTON DE SOUMISSION VERT --- */
        .btn-submit {
            width: 100%;
            background-color: #4A7c59; /* Vert dominant */
            color: #ffffff;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(74, 124, 89, 0.2);
            margin-top: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #385f44; /* Vert plus sombre au survol */
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(74, 124, 89, 0.25);
        }

        /* --- RESPONSIVE DESIGN (MOBILE) --- */
        @media (max-width: 840px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 460px;
            }
            
            .login-sidebar {
                display: none;
            }

            .login-form-area {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="login-sidebar" aria-hidden="true">
            <img class="login-hero-img" src="{% static 'images/Mobile login-bro.svg' %}" alt="Illustration de connexion" />
        </div>

        <div class="login-form-area">
            
            <div class="login-header">
                <h1>CPE<span>+</span></h1>
                <p>{% trans "Espace de gestion et supervision" %}</p>
            </div>

            {% if messages %}
                <div class="alert-container">
                    {% for message in messages %}
                        <div class="alert-error">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="form-space">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>{% trans "Nom d'utilisateur" %}</label>
                    <input type="text" name="nom" required autocomplete="username" class="form-control" placeholder="Ex: admin_cpe">
                </div>

                <div class="form-group">
                    <label>{% trans "Mot de passe" %}</label>
                    <input type="password" name="password" required autocomplete="current-password" class="form-control" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">
                    {% trans "Se connecter" %}
                </button>
            </form>
            
        </div>
    </div>

</body>
</html>
