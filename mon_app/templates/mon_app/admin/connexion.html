{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'fr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Connexion Administration - CPE" %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- STYLES GÉNÉRAUX --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            
            /* Fond avec le logo CPE en couverture totale */
            background-image: linear-gradient(rgba(244, 247, 245, 0.75), rgba(244, 247, 245, 0.75)), url("{% static 'images/LOGO_CPE-removebg-preview.jpeg' %}");
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }

        /* --- CONTENEUR SPLIT EN DEUX (PLUS TRANSPARENT : 50%) --- */
        .login-container {
            width: 100%;
            max-width: 960px;
            /* MODIFICATION : Passage à 0.5 d'opacité pour accentuer la transparence */
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            /* Augmentation du flou arrière-plan pour un effet "verre dépoli" intense */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 30px 60px rgba(44, 76, 53, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.45);
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            overflow: hidden;
            min-height: 560px;
            position: relative;
            z-index: 2;
        }

        /* --- COLONNE GAUCHE : VISUEL (VERT ÉGALEMENT SOUPLI À LA TRANSPARENCE) --- */
        .login-sidebar {
            /* Dégradé vert rendu un peu plus transparent (0.85) pour s'accorder avec le reste */
            background: linear-gradient(135deg, rgba(74, 124, 89, 0.85) 0%, rgba(44, 76, 53, 0.85) 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Effet de halo lumineux en arrière-plan */
        .login-sidebar::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(209, 143, 178, 0.15);
            border-radius: 50%;
            filter: blur(40px);
        }

        .login-hero-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
        }

        /* --- COLONNE DROITE : ZONE FORMULAIRE --- */
        .login-form-area {
            padding: 3.5rem 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: transparent;
        }

        /* --- EN-TÊTE --- */
        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #1e3524; /* Assombri pour rester lisible sur un fond très clair/transparent */
            letter-spacing: -0.5px;
        }

        .login-header h1 span {
            color: #D18FB2;
        }

        .login-header p {
            color: #334155;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-weight: 600; /* Plus épais pour contrer la transparence */
        }

        /* --- ERREURS DJANGO --- */
        .alert-container {
            margin-bottom: 1.5rem;
        }

        .alert-error {
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            border-radius: 12px;
            background-color: rgba(254, 242, 242, 0.95);
            color: #b91c1c;
            border: 1px solid #fee2e2;
        }

        /* --- CONFIGURATION DES CHAMPS --- */
        .form-space {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.875rem;
            font-weight: 700;
            color: #0f172a; /* Noir profond pour maximiser le contraste */
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1.25rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            border: 1px solid #94a3b8; /* Bordure légèrement plus visible */
            border-radius: 12px;
            /* Inputs à 60% d'opacité */
            background-color: rgba(248, 250, 252, 0.6);
            color: #0f172a;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        /* Focus effet sur les inputs */
        .form-control:focus {
            border-color: #4A7c59;
            background-color: #ffffff; /* Redvient 100% blanc au clic pour écrire confortablement */
            box-shadow: 0 0 0 4px rgba(74, 124, 89, 0.25);
        }

        /* --- BOUTON DE SOUMISSION --- */
        .btn-submit {
            width: 100%;
            background-color: #4A7c59;
            color: #ffffff;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(74, 124, 89, 0.4);
            margin-top: 0.5rem;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #2c4c35;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(74, 124, 89, 0.5);
        }

        /* --- RESPONSIVE DESIGN (MOBILE) --- */
        @media (max-width: 840px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 460px;
                /* On garde un peu plus d'opacité sur mobile pour éviter la fatigue visuelle */
                background-color: rgba(255, 255, 255, 0.7); 
            }
            
            .login-sidebar {
                display: none;
            }

            .login-form-area {
                padding: 3rem 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <div class="login-sidebar" aria-hidden="true">
            <img class="login-hero-img" src="{% static 'images/Mobile login-bro.svg' %}" alt="Illustration de connexion" />
        </div>

        <div class="login-form-area">
            
            <div class="login-header">
                <h1>CPE<span>+</span></h1>
                <p>{% trans "Espace de gestion et supervision" %}</p>
            </div>

            {% if messages %}
                <div class="alert-container">
                    {% for message in messages %}
                        <div class="alert-error">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="form-space">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>{% trans "Nom d'utilisateur" %}</label>
                    <input type="text" name="nom" required autocomplete="username" class="form-control" placeholder="Ex: admin_cpe">
                </div>

                <div class="form-group">
                    <label>{% trans "Mot de passe" %}</label>
                    <input type="password" name="password" required autocomplete="current-password" class="form-control" placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">
                    {% trans "Se connecter" %}
                </button>
            </form>
            
        </div>
    </div>

</body>
</html>
