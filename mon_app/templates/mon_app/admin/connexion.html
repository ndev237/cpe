<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration - CPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- STYLES GENERAUX --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* --- CONTENEUR DU FORMULAIRE --- */
        .login-card {
            width: 100%;
            max-width: 440px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 12px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
            padding: 2.5rem;
        }

        /* --- EN-TÊTE --- */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            font-size: 1.875rem;
            font-weight: 800;
            color: #003366;
        }

        .login-header h1 span {
            color: #D18FB2;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        /* --- ERREURS DJANGO --- */
        .alert-container {
            margin-bottom: 1rem;
        }

        .alert-error {
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            border-radius: 12px;
            background-color: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fee2e2;
            margin-bottom: 0.5rem;
        }

        /* --- FORMULAIRE CHAMPS --- */
        .form-space {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.375rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background-color: #f8fafc;
            color: #1e293b;
            outline: none;
            transition: all 0.2s ease-in-out;
        }

        /* Focus effet sur les inputs (Ring rose transparent) */
        .form-control:focus {
            border-color: #D18FB2;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(209, 143, 178, 0.15);
        }

        /* --- BOUTON SUBMIT --- */
        .btn-submit {
            width: 100%;
            background-color: #003366;
            color: #ffffff;
            padding: 0.875rem;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.15);
            margin-top: 0.5rem;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #002244;
        }
    </style>
</head>
<body>

    <div class="login-card">
        
        <div class="login-header">
            <h1>CPE<span>+</span></h1>
            <p>Espace de gestion et supervision</p>
        </div>

        {% if messages %}
            <div class="alert-container">
                {% for message in messages %}
                    <div class="alert-error">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="form-space">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="nom" required autocomplete="username" class="form-control">
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required autocomplete="current-password" class="form-control">
            </div>

            <button type="submit" class="btn-submit">
                Se connecter
            </button>
        </form>
    </div>

</body>
</html>
